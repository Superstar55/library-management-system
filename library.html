<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f7;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        .book {
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Library Management System</h1>

    <h3>Add Book</h3>

    <input type="text" id="title" placeholder="Book Title">
    <input type="text" id="author" placeholder="Author">
    <input type="number" id="year" placeholder="Year">

    <button onclick="addBook()">Add Book</button>

    <hr>

    <h3>Borrow / Return Book</h3>

    <input type="text" id="bookTitle" placeholder="Enter Book Title">

    <button onclick="borrowBook()">Borrow Book</button>
    <button onclick="returnBook()">Return Book</button>

    <hr>

    <h3>Available Books</h3>

    <button onclick="displayBooks()">Show Available Books</button>

    <div id="bookList"></div>
</div>

<script>
class Book {
    constructor(title, author, year) {
        this.title = title;
        this.author = author;
        this.year = year;
        this.available = true;
    }
}

class Library {
    constructor() {
        this.books = [];
    }

    addBook(book) {
        this.books.push(book);
    }

    borrowBook(title) {
        const book = this.books.find(
            b => b.title.toLowerCase() === title.toLowerCase()
        );

        if (book && book.available) {
            book.available = false;
            return "Book borrowed successfully.";
        }

        return "Book not available.";
    }

    returnBook(title) {
        const book = this.books.find(
            b => b.title.toLowerCase() === title.toLowerCase()
        );

        if (book) {
            book.available = true;
            return "Book returned successfully.";
        }

        return "Book not found.";
    }

    listAvailableBooks() {
        return this.books.filter(book => book.available);
    }
}

const library = new Library();

function addBook() {
    const title = document.getElementById("title").value;
    const author = document.getElementById("author").value;
    const year = document.getElementById("year").value;

    if (!title || !author || !year) {
        alert("Please fill all fields.");
        return;
    }

    library.addBook(new Book(title, author, year));

    alert("Book added successfully!");

    document.getElementById("title").value = "";
    document.getElementById("author").value = "";
    document.getElementById("year").value = "";

    displayBooks();
}

function borrowBook() {
    const title = document.getElementById("bookTitle").value;
    alert(library.borrowBook(title));
    displayBooks();
}

function returnBook() {
    const title = document.getElementById("bookTitle").value;
    alert(library.returnBook(title));
    displayBooks();
}

function displayBooks() {
    const bookList = document.getElementById("bookList");
    const books = library.listAvailableBooks();

    bookList.innerHTML = "";

    if (books.length === 0) {
        bookList.innerHTML = "<p>No available books.</p>";
        return;
    }

    books.forEach(book => {
        bookList.innerHTML += `
            <div class="book">
                <strong>Title:</strong> ${book.title}<br>
                <strong>Author:</strong> ${book.author}<br>
                <strong>Year:</strong> ${book.year}
            </div>
        `;
    });
}
</script>

</body>
</html>
